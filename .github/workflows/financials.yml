name: Update quarterly financials
on:
  schedule:
    - cron: "30 12 * * *"
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: financials
jobs:
  financials:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -r requirements.txt
      - run: python financials.py
      - run: |
          git config user.name "nepse-bot"
          git config user.email "bot@users.noreply.github.com"
          git add financials.json
          git diff --cached --quiet || git commit -m "financials"
          git pull --rebase origin main
          git push
